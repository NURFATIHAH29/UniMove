<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UVBS | Staff Sign Up</title>
    <link rel="stylesheet" href="Style.css"> 
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>

    <div class="main-wrapper">
        <div class="login-card">
            
            <div class="sidebar">
                <h2>University Logistics</h2>
                <div class="gold-line"></div>
                <p style="font-size: 0.8rem; opacity: 0.8; line-height: 1.6;">
                    Join the University Vehicle Booking System. This portal is for official UMT Staff registration.
                </p>
                
                <div style="margin-top: 2rem; font-size: 0.7rem; color: #b8974d; font-weight: bold; letter-spacing: 1px;">
                    <i class="fas fa-check-circle"></i> UMT PERSONNEL ONLY
                </div>
            </div>

            <div class="form-section">
                <h3>Create Account</h3>
                <p class="subtitle">Staff Registration</p>

                <form action="../SignupServlet" method="POST">
                    
                    <input type="hidden" name="role" value="staff">

                    <div class="input-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName" placeholder="Enter your full name" required>
                    </div>

                    <div class="input-group">
                        <label>Official UMT Email</label>
                        <input type="email" name="uEmail" placeholder="username@ocean.umt.edu.my" required>
                    </div>

                    <div class="input-group">
                        <label>IC Number (User ID)</label>
                        <input type="text" name="icNo" placeholder="12-digit IC (e.g. 010203010405)" pattern="\d{12}" title="Please enter 12 digits" required>
                    </div>

                    <div class="input-group">
                        <label>Staff / Employee ID</label>
                        <input type="text" name="staffID" placeholder="e.g. S76240" required>
                    </div>

                    <div class="input-group">
                        <label>Department / Unit</label>
                        <input type="text" name="dept" placeholder="e.g. FTMK / PPH" required>
                    </div>

                    <div class="input-group">
                        <label>Set Password</label>
                        <input type="password" name="pass" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn-signin">Register Now</button>
                    
                    <p style="font-size: 0.7rem; text-align: center; margin-top: 20px; color: #6b7280;">
    Already have an account? <a href="login.jsp" style="color: #003366; font-weight: bold; text-decoration: none;">Sign In</a>
</p>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
